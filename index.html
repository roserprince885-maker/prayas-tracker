<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prayas JEE 2027 — Study Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="header-left">
      <span class="logo-badge">PRAYAS</span>
      <div class="logo-text">
        <span class="logo-main">JEE 2027</span>
        <span class="logo-sub">Study Tracker</span>
      </div>
    </div>
    <div class="header-center">
      <div class="clock-wrap">
        <div id="clock-time" class="clock-time">00:00:00</div>
        <div id="clock-date" class="clock-date">Loading...</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="darkModeToggle" title="Toggle Dark Mode">🌙</button>
      <button class="btn-icon" id="printBtn" title="Print Progress">🖨️</button>
    </div>
  </header>

  <!-- ========== COUNTDOWN & INFO STRIP ========== -->
  <div class="info-strip">
    <div class="info-card countdown-card">
      <div class="info-label">Days to JEE Main Session 1</div>
      <div class="info-value" id="daysCountdown">—</div>
      <div class="info-sub">Jan 1, 2027</div>
    </div>
    <div class="info-card today-card">
      <div class="info-label">Today's Lectures</div>
      <div id="todayLectures" class="today-lectures-list">No lectures today</div>
    </div>
    <div class="info-card next-test-card">
      <div class="info-label">Next Test</div>
      <div id="nextTestName" class="info-value">—</div>
      <div id="nextTestDate" class="info-sub">—</div>
      <div id="nextTestDays" class="test-days-badge">—</div>
    </div>
  </div>

  <!-- ========== OVERALL PROGRESS BAR ========== -->
  <div class="overall-progress-section">
    <div class="op-header">
      <span>Overall Progress</span>
      <span id="overallPercent">0%</span>
    </div>
    <div class="op-bar-track"><div class="op-bar-fill" id="overallBar"></div></div>
    <div class="subject-mini-bars" id="subjectMiniBar"></div>
  </div>

  <!-- ========== NAV TABS ========== -->
  <nav class="subject-nav" id="subjectNav">
    <button class="nav-tab active" data-subject="all">📊 Overview</button>
    <button class="nav-tab" data-subject="Physics">⚡ Physics</button>
    <button class="nav-tab" data-subject="Physical Chemistry">🧪 Physical Chem</button>
    <button class="nav-tab" data-subject="Inorganic Chemistry">⚗️ Inorganic</button>
    <button class="nav-tab" data-subject="Organic Chemistry">🔬 Organic</button>
    <button class="nav-tab" data-subject="Mathematics">📐 Mathematics</button>
    <button class="nav-tab" data-subject="tests">📝 Tests</button>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content" id="mainContent">
    <!-- Dynamically rendered -->
  </main>

  <!-- ========== PRINT MODAL ========== -->
  <div class="modal-overlay" id="printModal">
    <div class="modal-box">
      <h3>Print / Export Progress</h3>
      <p>Select what to include in the PDF:</p>
      <label><input type="checkbox" id="pr_physics" checked> Physics</label>
      <label><input type="checkbox" id="pr_pchem" checked> Physical Chemistry</label>
      <label><input type="checkbox" id="pr_inorg" checked> Inorganic Chemistry</label>
      <label><input type="checkbox" id="pr_org" checked> Organic Chemistry</label>
      <label><input type="checkbox" id="pr_maths" checked> Mathematics</label>
      <label><input type="checkbox" id="pr_tests" checked> Tests</label>
      <div class="modal-actions">
        <button class="btn-primary" id="confirmPrint">🖨️ Print</button>
        <button class="btn-secondary" id="cancelPrint">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="data/curriculum.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
